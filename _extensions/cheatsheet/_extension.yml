title: Cheatsheet
author: Noël Schaller
version: 0.0.1
quarto-required: ">=1.4.0"
contributes:
  formats:
    typst:
      filters:
        - blocks-filter.lua
        - math-macros.lua
      paper: "a4"
      orientation: "landscape"
      columns: 3
      margin:
        x: 1cm
        y: 1cm
      font-size: 9pt
      template-partials:
        - typst-template.typ
        - typst-show.typ
      include-before-body:
        - math.typ
        - callouts.typ
        - theorems.typ
